<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0e14" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Family Stocks" />
  <title>Family Stocks 📈</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- ===================== SWITCH GLOBAL ===================== -->
  <header class="topbar">
    <div class="brand">Family&nbsp;Stocks <span class="up">📈</span></div>
    <div class="switch">
      <button class="switch-btn active" data-vista="ninos">👀 Niños</button>
      <button class="switch-btn" data-vista="padres">🔒 Padres</button>
    </div>
  </header>

  <!-- ======================================================== -->
  <!--  VISTA NIÑOS · Solo lectura                              -->
  <!-- ======================================================== -->
  <main id="view-ninos" class="vista">
    <!-- Reloj / multiplicador en vivo -->
    <section id="reloj-mercado" class="card reloj"></section>

    <div class="ninos-grid">
      <!-- Podios -->
      <section class="card panel">
        <h2 class="panel-title">🏆 Patrimonio Vivo · Semanal</h2>
        <div id="podio-semanal"></div>
      </section>
      <section class="card panel">
        <h2 class="panel-title">🏦 Cash Global · Histórico</h2>
        <div id="podio-global"></div>
      </section>

      <!-- Pizarra de cotizaciones -->
      <section class="card panel pizarra">
        <h2 class="panel-title">📊 Pizarra de cotizaciones (hoy)</h2>
        <table class="tabla">
          <thead><tr><th>Activo</th><th class="text-right">Hoy</th><th class="text-right">Var</th></tr></thead>
          <tbody id="pizarra-body" class="mono"></tbody>
        </table>
      </section>
    </div>
  </main>

  <!-- ======================================================== -->
  <!--  VISTA PADRES · Broker                                   -->
  <!-- ======================================================== -->
  <main id="view-padres" class="vista hidden">
    <div class="padres-bar"><span id="padres-modo" class="modo"></span></div>
    <div id="padres-contenido"></div>
  </main>

  <!-- ===================== MODAL PIN ===================== -->
  <div id="modal-pin" class="modal hidden">
    <div class="card modal-box pin-box">
      <div class="text-3xl">🔒</div>
      <h3 class="font-bold text-lg">PIN de padres</h3>
      <p class="text-xs flat mb-3">Solo los padres pueden operar</p>
      <div class="pin-dots"><span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span></div>
      <p id="pin-error" class="down text-xs font-semibold hidden mt-2">PIN incorrecto</p>
      <div class="numpad">
        <button class="pinkey" data-pin="1">1</button><button class="pinkey" data-pin="2">2</button><button class="pinkey" data-pin="3">3</button>
        <button class="pinkey" data-pin="4">4</button><button class="pinkey" data-pin="5">5</button><button class="pinkey" data-pin="6">6</button>
        <button class="pinkey" data-pin="7">7</button><button class="pinkey" data-pin="8">8</button><button class="pinkey" data-pin="9">9</button>
        <button class="pinkey flat" data-pin="del">⌫</button><button class="pinkey" data-pin="0">0</button>
        <button class="pinkey flat" id="pin-cancel">✕</button>
      </div>
    </div>
  </div>

  <!-- ===================== MODAL CONFIRMAR ===================== -->
  <div id="modal-confirm" class="modal hidden">
    <div class="card modal-box">
      <div class="text-3xl mb-2">⚠️</div>
      <p id="confirm-text" class="mb-4 font-semibold"></p>
      <div class="flex gap-3">
        <button id="confirm-no" class="btn-sec flex-1">Cancelar</button>
        <button id="confirm-si" class="btn-primary flex-1">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- ===================== MODAL ACCIÓN (CRUD) ===================== -->
  <div id="modal-accion" class="modal hidden">
    <div class="card modal-box modal-form">
      <h3 id="form-accion-titulo" class="font-bold text-lg mb-3">Nueva acción</h3>
      <form id="form-accion" class="form-grid">
        <input type="hidden" name="id" />
        <label>Nombre<input name="nombre" type="text" required placeholder="Ej. Recoger cocina" /></label>
        <div class="row-2">
          <label>Tipo
            <select name="tipo">
              <option value="activo">Activo (tarea +)</option>
              <option value="pasivo">Pasivo (multa −)</option>
            </select>
          </label>
          <label>Icono<input name="icono" type="text" maxlength="4" placeholder="🍳" /></label>
        </div>
        <div class="row-2">
          <label>Valor de salida<input name="precio_base" type="number" step="0.1" min="0.1" required /></label>
          <label>Volatilidad (0–1)<input name="volatilidad" type="number" step="0.05" min="0" max="1" value="0" /></label>
        </div>
        <label class="check-row">
          <input name="paga_dividendo" type="checkbox" /> 🪙 Paga dividendo (renta por holdear)
        </label>
        <div id="div-fields" class="row-2 hidden">
          <label>Puntos por acción<input name="dividendo_monto" type="number" step="0.1" min="0" value="0" /></label>
          <label>Frecuencia
            <select name="dividendo_frecuencia">
              <option value="ninguna">Ninguna</option>
              <option value="diaria">Diaria</option>
              <option value="semanal">Semanal</option>
              <option value="mensual">Mensual</option>
            </select>
          </label>
        </div>
        <div class="flex gap-3 mt-2">
          <button type="button" id="accion-cancel" class="btn-sec flex-1">Cancelar</button>
          <button type="submit" class="btn-primary flex-1">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
