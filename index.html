<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Family Stocks" />
  <title>FAMILY STOCKS</title>

  <!-- Assets propios (carpeta /assets) -->
  <link rel="icon" type="image/svg+xml" href="./assets/icono.svg" />
  <link rel="apple-touch-icon" href="./assets/logoapp.png" />
  <link rel="manifest" href="./manifest.json" />

  <link rel="stylesheet" href="./css/styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Iconografía profesional (emojis reservados solo para avatares) -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 antialiased selection:bg-emerald-500/30">

  <!-- ===================== TOPBAR + SWITCH ===================== -->
  <header class="sticky top-0 z-30 flex items-center justify-between border-b border-zinc-800 bg-zinc-950/95 px-4 py-3 backdrop-blur">
    <div class="flex items-center gap-2.5">
      <img src="./assets/icono.svg" alt="Family Stocks" class="h-5 w-5" />
      <span class="text-sm font-bold uppercase tracking-[0.25em] text-zinc-100">Family&nbsp;Stocks</span>
    </div>
    <div class="flex border border-zinc-800">
      <button class="switch-btn active" data-vista="ninos">Niños</button>
      <button class="switch-btn border-l border-zinc-800" data-vista="padres">Padres</button>
    </div>
  </header>

  <!-- ======================================================== -->
  <!--  VISTA NIÑOS · solo lectura                              -->
  <!-- ======================================================== -->
  <main id="view-ninos" class="mx-auto max-w-6xl p-4">
    <!-- Reloj / multiplicador -->
    <section id="reloj-mercado" class="mb-4 border border-zinc-800 bg-zinc-900 p-4"></section>

    <div class="grid grid-cols-1 gap-4 lg:grid-cols-3">
      <!-- Patrimonio semanal -->
      <section class="border border-zinc-800 bg-zinc-900 p-4">
        <h2 class="mb-3 text-[11px] font-semibold uppercase tracking-widest text-zinc-500">Patrimonio Vivo · Semanal</h2>
        <div id="podio-semanal" class="divide-y divide-zinc-800 border border-zinc-800"></div>
      </section>
      <!-- Cash global -->
      <section class="border border-zinc-800 bg-zinc-900 p-4">
        <h2 class="mb-3 text-[11px] font-semibold uppercase tracking-widest text-zinc-500">Cash Global · Histórico</h2>
        <div id="podio-global" class="divide-y divide-zinc-800 border border-zinc-800"></div>
      </section>
      <!-- Pizarra -->
      <section class="border border-zinc-800 bg-zinc-900 p-4">
        <h2 class="mb-3 text-[11px] font-semibold uppercase tracking-widest text-zinc-500">Pizarra · Cotización de hoy</h2>
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-zinc-700 text-[10px] uppercase tracking-widest text-zinc-600">
              <th class="py-1.5 text-left font-medium">Activo</th>
              <th class="py-1.5 text-right font-medium">Hoy</th>
              <th class="py-1.5 text-right font-medium">Var</th>
            </tr>
          </thead>
          <tbody id="pizarra-body" class="divide-y divide-zinc-800/80"></tbody>
        </table>
      </section>
    </div>
  </main>

  <!-- ======================================================== -->
  <!--  VISTA PADRES · broker                                   -->
  <!-- ======================================================== -->
  <main id="view-padres" class="mx-auto max-w-3xl p-4 hidden">
    <div id="padres-modo" class="mb-4 text-[11px] font-semibold uppercase tracking-widest text-zinc-500"></div>
    <div id="padres-contenido"></div>
  </main>

  <!-- ===================== MODAL PIN ===================== -->
  <div id="modal-pin" class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4 hidden">
    <div class="w-full max-w-xs border border-zinc-800 bg-zinc-900 p-5">
      <div class="mb-1 text-[11px] font-semibold uppercase tracking-widest text-zinc-500">Acceso padres</div>
      <p class="mb-4 text-xs text-zinc-400">Introduce el PIN para operar.</p>
      <div class="mb-2 flex justify-center gap-3">
        <span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span><span class="pin-dot"></span>
      </div>
      <p id="pin-error" class="mb-3 text-center text-xs font-medium text-red-500 hidden">PIN incorrecto</p>
      <div class="grid grid-cols-3 gap-px border border-zinc-800 bg-zinc-800">
        <button class="pinkey" data-pin="1">1</button><button class="pinkey" data-pin="2">2</button><button class="pinkey" data-pin="3">3</button>
        <button class="pinkey" data-pin="4">4</button><button class="pinkey" data-pin="5">5</button><button class="pinkey" data-pin="6">6</button>
        <button class="pinkey" data-pin="7">7</button><button class="pinkey" data-pin="8">8</button><button class="pinkey" data-pin="9">9</button>
        <button class="pinkey text-zinc-500" data-pin="del"><i data-lucide="delete" class="mx-auto h-5 w-5"></i></button>
        <button class="pinkey" data-pin="0">0</button>
        <button class="pinkey text-zinc-500" id="pin-cancel"><i data-lucide="x" class="mx-auto h-5 w-5"></i></button>
      </div>
    </div>
  </div>

  <!-- ===================== MODAL CONFIRMAR ===================== -->
  <div id="modal-confirm" class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4 hidden">
    <div class="w-full max-w-sm border border-zinc-800 bg-zinc-900 p-5">
      <div class="mb-2 text-[11px] font-semibold uppercase tracking-widest text-red-500">Confirmación</div>
      <p id="confirm-text" class="mb-5 text-sm text-zinc-200"></p>
      <div class="grid grid-cols-2 gap-2">
        <button id="confirm-no" class="border border-zinc-800 px-3 py-2 text-sm text-zinc-300 transition-colors hover:bg-zinc-800">Cancelar</button>
        <button id="confirm-si" class="border border-red-500/50 px-3 py-2 text-sm font-semibold uppercase tracking-wider text-red-500 transition-colors hover:bg-red-500/10">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- ===================== MODAL ACCIÓN (CRUD) ===================== -->
  <div id="modal-accion" class="fixed inset-0 z-50 flex items-center justify-center bg-black/85 p-4 hidden">
    <div class="w-full max-w-md border border-zinc-800 bg-zinc-900 p-5">
      <h3 id="form-accion-titulo" class="mb-4 text-[11px] font-semibold uppercase tracking-widest text-zinc-500">Nueva acción</h3>
      <form id="form-accion" class="space-y-3">
        <input type="hidden" name="id" />
        <label class="block">
          <span class="mb-1 block text-[10px] uppercase tracking-widest text-zinc-500">Nombre</span>
          <input name="nombre" type="text" required placeholder="Recoger cocina" class="fld" />
        </label>
        <label class="block">
          <span class="mb-1 block text-[10px] uppercase tracking-widest text-zinc-500">Tipo</span>
          <select name="tipo" class="fld">
            <option value="activo">Activo (tarea +)</option>
            <option value="pasivo">Pasivo (multa −)</option>
          </select>
        </label>
        <div class="grid grid-cols-2 gap-3">
          <label class="block">
            <span class="mb-1 block text-[10px] uppercase tracking-widest text-zinc-500">Valor de salida</span>
            <input name="precio_base" type="number" step="0.1" min="0.1" required class="fld font-mono tabular-nums" />
          </label>
          <label class="block">
            <span class="mb-1 block text-[10px] uppercase tracking-widest text-zinc-500">Volatilidad 0–1</span>
            <input name="volatilidad" type="number" step="0.05" min="0" max="1" value="0" class="fld font-mono tabular-nums" />
          </label>
        </div>
        <label class="flex items-center gap-2 text-sm text-zinc-300">
          <input name="paga_dividendo" type="checkbox" class="h-4 w-4 accent-emerald-500" /> Paga dividendo (renta por holdear)
        </label>
        <div id="div-fields" class="grid grid-cols-2 gap-3 hidden">
          <label class="block">
            <span class="mb-1 block text-[10px] uppercase tracking-widest text-zinc-500">Puntos / acción</span>
            <input name="dividendo_monto" type="number" step="0.1" min="0" value="0" class="fld font-mono tabular-nums" />
          </label>
          <label class="block">
            <span class="mb-1 block text-[10px] uppercase tracking-widest text-zinc-500">Frecuencia</span>
            <select name="dividendo_frecuencia" class="fld">
              <option value="ninguna">Ninguna</option>
              <option value="diaria">Diaria</option>
              <option value="semanal">Semanal</option>
              <option value="mensual">Mensual</option>
            </select>
          </label>
        </div>
        <div class="grid grid-cols-2 gap-2 pt-1">
          <button type="button" id="accion-cancel" class="border border-zinc-800 px-3 py-2 text-sm text-zinc-300 transition-colors hover:bg-zinc-800">Cancelar</button>
          <button type="submit" class="border border-emerald-500/50 px-3 py-2 text-sm font-semibold uppercase tracking-wider text-emerald-400 transition-colors hover:bg-emerald-500/10">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
